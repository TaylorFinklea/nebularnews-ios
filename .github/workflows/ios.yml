name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  nebularnews-ios:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Swift package tests
        run: swift test
        working-directory: NebularNewsKit

      - name: Validate simulator build
        run: |
          xcodebuild \
            -project NebularNews/NebularNews.xcodeproj \
            -scheme NebularNews \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Validate device build
        run: |
          xcodebuild \
            -project NebularNews/NebularNews.xcodeproj \
            -scheme NebularNews \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Select stable iPhone simulators
        run: |
          python3 <<'PY' >> "$GITHUB_ENV"
          import json
          import subprocess
          import sys

          preferred_names = [
              "iPhone 17",
              "iPhone 17 Pro",
              "iPhone 17 Pro Max",
              "iPhone 16 Pro",
              "iPhone 16 Pro Max",
              "iPhone 16",
              "iPhone 15 Pro",
              "iPhone 15 Pro Max",
              "iPhone 15",
          ]

          data = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "-j"],
              text=True,
          ))

          candidates = []
          for runtime, devices in data.get("devices", {}).items():
              if "iOS" not in runtime:
                  continue
              for device in devices:
                  if not device.get("isAvailable"):
                      continue
                  if not device.get("name", "").startswith("iPhone"):
                      continue
                  candidates.append((runtime, device["name"], device["udid"]))

          if not candidates:
              print("No available iPhone simulator found.", file=sys.stderr)
              sys.exit(1)

          def rank(candidate):
              runtime, name, _ = candidate
              try:
                  preferred_index = preferred_names.index(name)
              except ValueError:
                  preferred_index = len(preferred_names)
              return (preferred_index, runtime, name)

          candidates.sort(key=rank)
          ordered_udids = ",".join(candidate[2] for candidate in candidates)
          ordered_names = " | ".join(f"{candidate[1]} ({candidate[0]})" for candidate in candidates)
          print(f"SIMULATOR_CANDIDATE_UDIDS={ordered_udids}")
          print(f"SIMULATOR_CANDIDATE_NAMES={ordered_names}")
          PY

      - name: Run app unit tests
        run: |
          IFS=',' read -r -a candidate_udids <<< "$SIMULATOR_CANDIDATE_UDIDS"
          selected_udid=""

          for candidate_udid in "${candidate_udids[@]}"; do
            echo "Trying simulator $candidate_udid"
            xcrun simctl shutdown "$candidate_udid" || true
            xcrun simctl erase "$candidate_udid" || true
            if xcrun simctl boot "$candidate_udid" && xcrun simctl bootstatus "$candidate_udid" -b; then
              selected_udid="$candidate_udid"
              break
            fi
            echo "Simulator $candidate_udid failed to boot cleanly, trying next candidate"
            xcrun simctl shutdown "$candidate_udid" || true
          done

          if [ -z "$selected_udid" ]; then
            echo "No simulator candidate booted successfully"
            exit 1
          fi

          echo "Using simulator $selected_udid"
          xcodebuild \
            -project NebularNews/NebularNews.xcodeproj \
            -scheme NebularNews \
            -destination "id=$selected_udid" \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:NebularNewsTests \
            test
